<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Glow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; width: 100vw; height: 100vh; text-align: center; }

  .aurora {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  .aurora .band {
    position: absolute;
    width: 200%;
    left: -50%;
    filter: blur(60px);
    opacity: 0;
    mix-blend-mode: screen;
    will-change: transform, opacity;
  }

  .band-1 {
    height: 35vh;
    top: 5%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      #064e3b 15%,
      #0d9488 30%,
      #06b6d4 45%,
      #0d9488 60%,
      #064e3b 80%,
      transparent 100%
    );
    animation: aurora1 12s ease-in-out infinite alternate, fadeIn 2s ease forwards;
  }

  .band-2 {
    height: 25vh;
    top: 15%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      #14532d 10%,
      #22c55e 25%,
      #10b981 40%,
      #059669 55%,
      #14532d 75%,
      transparent 100%
    );
    animation: aurora2 16s ease-in-out infinite alternate, fadeIn 2s 0.5s ease forwards;
  }

  .band-3 {
    height: 30vh;
    top: 0%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      #4c1d95 20%,
      #7c3aed 35%,
      #8b5cf6 50%,
      #6d28d9 65%,
      #4c1d95 85%,
      transparent 100%
    );
    animation: aurora3 20s ease-in-out infinite alternate, fadeIn 2s 1s ease forwards;
    opacity: 0;
  }

  .band-4 {
    height: 20vh;
    top: 10%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      #0f766e 15%,
      #2dd4bf 40%,
      #a78bfa 60%,
      #0f766e 85%,
      transparent 100%
    );
    animation: aurora4 14s ease-in-out infinite alternate, fadeIn 2s 1.5s ease forwards;
  }

  .band-5 {
    height: 15vh;
    top: 20%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      #065f46 25%,
      #34d399 50%,
      #065f46 75%,
      transparent 100%
    );
    filter: blur(40px);
    animation: aurora5 10s ease-in-out infinite alternate, fadeIn 2s 0.8s ease forwards;
  }

  /* Subtle star field */
  .stars {
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 95% 15%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 40% 45%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 75% 85%, rgba(255,255,255,0.3), transparent);
  }

  @keyframes fadeIn {
    to { opacity: 0.55; }
  }

  @keyframes aurora1 {
    0%   { transform: translateX(0) scaleY(1) skewX(0deg); }
    30%  { transform: translateX(8%) scaleY(1.3) skewX(-3deg); }
    60%  { transform: translateX(-5%) scaleY(0.8) skewX(2deg); }
    100% { transform: translateX(3%) scaleY(1.1) skewX(-1deg); }
  }

  @keyframes aurora2 {
    0%   { transform: translateX(0) scaleY(1) skewX(0deg); }
    25%  { transform: translateX(-10%) scaleY(1.4) skewX(4deg); }
    50%  { transform: translateX(5%) scaleY(0.7) skewX(-2deg); }
    75%  { transform: translateX(-3%) scaleY(1.2) skewX(1deg); }
    100% { transform: translateX(7%) scaleY(0.9) skewX(-3deg); }
  }

  @keyframes aurora3 {
    0%   { transform: translateX(0) scaleY(1); }
    50%  { transform: translateX(12%) scaleY(1.5); }
    100% { transform: translateX(-8%) scaleY(0.8); }
  }

  @keyframes aurora4 {
    0%   { transform: translateX(0) scaleY(1) skewX(0deg); }
    40%  { transform: translateX(-7%) scaleY(1.6) skewX(5deg); }
    100% { transform: translateX(10%) scaleY(0.6) skewX(-4deg); }
  }

  @keyframes aurora5 {
    0%   { transform: translateX(5%) scaleY(1); }
    50%  { transform: translateX(-8%) scaleY(2); }
    100% { transform: translateX(3%) scaleY(0.7); }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="aurora">
  <div class="band band-1"></div>
  <div class="band band-2"></div>
  <div class="band band-3"></div>
  <div class="band band-4"></div>
  <div class="band band-5"></div>
</div>
</body>
</html>
