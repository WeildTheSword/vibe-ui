<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Mesh</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; width: 100vw; height: 100vh; }

  .mesh {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  .mesh::before,
  .mesh::after,
  .blob-1,
  .blob-2,
  .blob-3 {
    position: absolute;
    width: 80vmax;
    height: 80vmax;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.6;
    will-change: transform;
  }

  .mesh::before {
    content: '';
    background: radial-gradient(circle, #6b21a8 0%, transparent 70%);
    top: -20%;
    left: -10%;
    animation: drift1 18s ease-in-out infinite alternate;
  }

  .mesh::after {
    content: '';
    background: radial-gradient(circle, #0d9488 0%, transparent 70%);
    bottom: -30%;
    right: -10%;
    animation: drift2 22s ease-in-out infinite alternate;
  }

  .blob-1 {
    background: radial-gradient(circle, #1d4ed8 0%, transparent 70%);
    top: 30%;
    left: 40%;
    animation: drift3 25s ease-in-out infinite alternate;
    opacity: 0.5;
  }

  .blob-2 {
    background: radial-gradient(circle, #be185d 0%, transparent 70%);
    top: -10%;
    right: 20%;
    width: 60vmax;
    height: 60vmax;
    animation: drift4 20s ease-in-out infinite alternate;
    opacity: 0.45;
  }

  .blob-3 {
    background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
    bottom: 10%;
    left: 10%;
    width: 50vmax;
    height: 50vmax;
    animation: drift5 28s ease-in-out infinite alternate;
    opacity: 0.4;
  }

  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(15vw, 10vh) scale(1.1); }
    66%  { transform: translate(-5vw, 20vh) scale(0.95); }
    100% { transform: translate(10vw, 5vh) scale(1.05); }
  }

  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(-20vw, -15vh) scale(1.15); }
    66%  { transform: translate(-10vw, -5vh) scale(0.9); }
    100% { transform: translate(-15vw, -20vh) scale(1.1); }
  }

  @keyframes drift3 {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(-25vw, 15vh) scale(1.2); }
    100% { transform: translate(10vw, -10vh) scale(0.85); }
  }

  @keyframes drift4 {
    0%   { transform: translate(0, 0) rotate(0deg) scale(1); }
    50%  { transform: translate(-15vw, 25vh) rotate(30deg) scale(1.15); }
    100% { transform: translate(5vw, 10vh) rotate(-10deg) scale(0.9); }
  }

  @keyframes drift5 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(20vw, -10vh) scale(1.1); }
    66%  { transform: translate(15vw, 15vh) scale(0.95); }
    100% { transform: translate(-5vw, 5vh) scale(1.2); }
  }
</style>
</head>
<body>
<div class="mesh">
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="blob-3"></div>
</div>
</body>
</html>
