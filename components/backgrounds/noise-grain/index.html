<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Grain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle background gradient for depth */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #0a0a0a 70%);
    z-index: 0;
  }

  /* Grain overlay */
  .grain {
    position: fixed;
    inset: -100%;
    width: 300%;
    height: 300%;
    z-index: 1;
    pointer-events: none;
    opacity: 0.035;
    animation: grain 0.5s steps(4) infinite;
  }

  .grain svg {
    width: 100%;
    height: 100%;
  }

  @keyframes grain {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-2%, -3%); }
    50%  { transform: translate(3%, 1%); }
    75%  { transform: translate(-1%, 2%); }
    100% { transform: translate(2%, -1%); }
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    max-width: 640px;
    padding: 2rem;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  .content h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 700;
    color: #f5f5f5;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1.25rem;
  }

  .content p {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    color: #888;
    line-height: 1.7;
    font-weight: 400;
  }

  /* Thin horizontal rule for elegance */
  .content hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, #333, transparent);
    margin: 1.5rem auto;
    width: 60%;
  }
</style>
</head>
<body>

<div class="grain">
  <svg>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)"/>
  </svg>
</div>

<div class="content">
  <h1>Premium Texture</h1>
  <hr>
  <p>A subtle film grain overlay adds depth and materiality to dark interfaces. The animated noise creates a living, breathing surface that feels tactile and refined.</p>
</div>

</body>
</html>
