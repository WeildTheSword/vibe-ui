<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch Text</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    overflow: hidden;
  }

  .glitch {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: clamp(4rem, 12vw, 10rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    color: #e2e8f0;
    position: relative;
    display: inline-block;
  }

  .glitch::before,
  .glitch::after {
    content: 'YOUR TEXT HERE';
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .glitch::before {
    color: #0ff;
    z-index: -1;
    animation: glitch-cyan 6s infinite linear;
  }

  .glitch::after {
    color: #f22;
    z-index: -1;
    animation: glitch-red 6s infinite linear;
  }

  /* Cyan channel - glitches at ~2s mark, stays still otherwise */
  @keyframes glitch-cyan {
    0%, 30%   { clip-path: inset(0 0 0 0); transform: translate(0); }
    31%       { clip-path: inset(20% 0 60% 0); transform: translate(-6px, 2px); }
    32%       { clip-path: inset(70% 0 5% 0);  transform: translate(4px, -1px); }
    33%       { clip-path: inset(10% 0 40% 0); transform: translate(-3px, 0); }
    34%       { clip-path: inset(50% 0 20% 0); transform: translate(7px, 2px); }
    35%       { clip-path: inset(30% 0 50% 0); transform: translate(-5px, -1px); }
    36%       { clip-path: inset(80% 0 2% 0);  transform: translate(2px, 1px); }
    37%       { clip-path: inset(5% 0 85% 0);  transform: translate(-4px, 0); }
    38%, 64%  { clip-path: inset(0 0 0 0); transform: translate(0); }
    65%       { clip-path: inset(45% 0 30% 0); transform: translate(5px, -2px); }
    66%       { clip-path: inset(15% 0 70% 0); transform: translate(-7px, 1px); }
    67%       { clip-path: inset(60% 0 10% 0); transform: translate(3px, 0); }
    68%       { clip-path: inset(25% 0 55% 0); transform: translate(-2px, 2px); }
    69%       { clip-path: inset(75% 0 15% 0); transform: translate(6px, -1px); }
    70%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
  }

  /* Red channel - glitches at ~2s mark offset, stays still otherwise */
  @keyframes glitch-red {
    0%, 29%   { clip-path: inset(0 0 0 0); transform: translate(0); }
    30%       { clip-path: inset(65% 0 15% 0); transform: translate(5px, -1px); }
    31%       { clip-path: inset(10% 0 75% 0); transform: translate(-4px, 2px); }
    32%       { clip-path: inset(40% 0 35% 0); transform: translate(6px, 0); }
    33%       { clip-path: inset(85% 0 5% 0);  transform: translate(-3px, -2px); }
    34%       { clip-path: inset(20% 0 60% 0); transform: translate(4px, 1px); }
    35%       { clip-path: inset(55% 0 25% 0); transform: translate(-6px, 0); }
    36%       { clip-path: inset(5% 0 80% 0);  transform: translate(3px, 2px); }
    37%       { clip-path: inset(35% 0 45% 0); transform: translate(-2px, -1px); }
    38%, 63%  { clip-path: inset(0 0 0 0); transform: translate(0); }
    64%       { clip-path: inset(50% 0 20% 0); transform: translate(-5px, 1px); }
    65%       { clip-path: inset(8% 0 82% 0);  transform: translate(7px, -2px); }
    66%       { clip-path: inset(70% 0 10% 0); transform: translate(-3px, 0); }
    67%       { clip-path: inset(30% 0 50% 0); transform: translate(4px, 2px); }
    68%       { clip-path: inset(90% 0 2% 0);  transform: translate(-6px, -1px); }
    69%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
  }

  /* Subtle scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
  <h1 class="glitch">YOUR TEXT HERE</h1>
</body>
</html>
